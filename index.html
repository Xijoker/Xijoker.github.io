<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>💌 给你的信</title>
    <style>
        /* ===== 全局 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #fce8e6, #fbd9d0);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Georgia', 'Times New Roman', serif;
            padding: 20px;
            margin: 0;
        }
        .card {
            max-width: 600px;
            width: 100%;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(12px);
            border-radius: 48px;
            padding: 40px 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.12);
            text-align: center;
            position: relative;
            overflow: hidden;
            min-height: 460px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .card::before {
            content: "❤️";
            position: absolute;
            top: -20px;
            right: -10px;
            font-size: 120px;
            opacity: 0.08;
            transform: rotate(15deg);
        }

        /* ===== 信封区域（初始） ===== */
        #envelope {
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: opacity 0.8s ease, transform 0.8s ease;
            width: 100%;
        }
        #envelope.hidden {
            opacity: 0;
            transform: scale(0.9);
            pointer-events: none;
            position: absolute;
        }
        .envelope-icon {
            font-size: 100px;
            line-height: 1;
            margin-bottom: 20px;
            animation: float 2s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .envelope-text {
            font-size: 1.4rem;
            color: #4a2c2a;
            margin-bottom: 30px;
            font-weight: 300;
            letter-spacing: 4px;
        }

        /* ===== 进度条 ===== */
        #loadingArea {
            width: 80%;
            margin: 10px auto 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }
        .progress-bar-bg {
            width: 100%;
            height: 8px;
            background: #e0d6d4;
            border-radius: 10px;
            overflow: hidden;
        }
        .progress-bar-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #ff6b6b, #ff8e8e);
            border-radius: 10px;
            transition: width 0.3s ease;
        }
        .loading-text {
            font-size: 1rem;
            color: #7a5a56;
            letter-spacing: 2px;
            font-weight: 300;
        }

        /* ===== 拆开按钮 ===== */
        #openBtn {
            background: #ff6b6b;
            border: none;
            color: white;
            font-size: 1.5rem;
            padding: 16px 48px;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 8px 30px rgba(255, 107, 107, 0.4);
            transition: all 0.3s;
            font-weight: 600;
            letter-spacing: 2px;
            display: none;
        }
        #openBtn.show {
            display: inline-block;
        }
        #openBtn:hover {
            transform: scale(1.05);
            background: #ff5252;
            box-shadow: 0 12px 40px rgba(255, 107, 107, 0.5);
        }
        #openBtn:active {
            transform: scale(0.95);
        }
        #openBtn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* ===== 文字区域（包含律动条） ===== */
        #content {
            display: none;
            flex-direction: column;
            gap: 20px;
            margin: 10px 0 10px;
            width: 100%;
            opacity: 0;
            transition: opacity 0.8s ease, transform 0.8s ease;
        }
        #content.visible {
            display: flex;
            opacity: 1;
        }
        #content.closing {
            opacity: 0;
            transform: translateY(-60px);
            pointer-events: none;
        }
        .line {
            font-size: 1.6rem;
            line-height: 1.6;
            color: #4a2c2a;
            font-weight: 600;
            letter-spacing: 1px;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 1.2s ease, transform 1.2s ease;
        }
        .line.show {
            opacity: 1;
            transform: translateY(0);
        }

        /* ===== 律动条容器 ===== */
        #visualizerWrapper {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 8px;
            min-height: 70px;
            opacity: 0;
            transition: opacity 0.8s ease;
        }
        #visualizerWrapper.active {
            opacity: 1;
        }

        #visualizer {
            width: 70%;
            max-width: 400px;
            height: 60px;
            border-radius: 30px;
            background: rgba(255, 215, 200, 0.2);
            backdrop-filter: blur(4px);
            transition: opacity 0.8s ease;
            display: block;
        }
        #visualizer.fade-out {
            opacity: 0;
        }

        /* ===== 信封背面（最终展示） ===== */
        #letterBack {
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
            padding: 40px 30px;
            min-height: 300px;
            background: linear-gradient(160deg, #fdf6f0, #f5e6d3);
            border-radius: 28px;
            box-shadow: 0 8px 40px rgba(120, 70, 50, 0.15), inset 0 1px 0 rgba(255, 255, 255, 0.6);
            border: 1px solid #e8d5c4;
            position: relative;
            opacity: 0;
            transform: scale(0.7) rotate(-2deg);
            transition: opacity 0.9s cubic-bezier(0.34, 1.56, 0.64, 1), transform 0.9s cubic-bezier(0.34, 1.56, 0.64, 1);
            margin: 10px 0;
        }
        #letterBack.show {
            display: flex;
            opacity: 1;
            transform: scale(1) rotate(0deg);
        }
        #letterBack::before {
            content: '';
            position: absolute;
            inset: 12px;
            border: 1.5px dashed #dcc4b4;
            border-radius: 18px;
            pointer-events: none;
        }
        #letterBack .stamp {
            position: absolute;
            top: 20px;
            right: 24px;
            font-size: 2rem;
            opacity: 0.5;
            transform: rotate(12deg);
        }
        #letterBack .main-text {
            font-size: 3.4rem;
            font-weight: 700;
            color: #4a2c2a;
            letter-spacing: 6px;
            text-shadow: 0 2px 12px rgba(200, 120, 100, 0.15);
            margin-bottom: 10px;
            font-family: 'Georgia', serif;
        }
        #letterBack .main-text .heart {
            color: #e06060;
            display: inline-block;
            animation: pulseHeart 1.8s ease-in-out infinite;
        }
        @keyframes pulseHeart {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }
        #letterBack .sub-text {
            font-size: 1rem;
            color: #b0887a;
            letter-spacing: 6px;
            font-weight: 300;
            margin-top: 2px;
        }
        #letterBack .sender {
            position: absolute;
            bottom: 28px;
            right: 32px;
            font-size: 1.15rem;
            color: #7a5a56;
            font-weight: 400;
            letter-spacing: 2px;
            font-style: italic;
        }
        #letterBack .sender::before {
            content: '✉ ';
            font-style: normal;
        }

        /* ===== 底部 ===== */
        .footer {
            margin-top: 25px;
            font-size: 0.9rem;
            color: #b07a76;
            letter-spacing: 2px;
            transition: opacity 0.6s ease;
        }
        .footer.hide {
            opacity: 0;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="card">
        <!-- ===== 信封（初始状态） ===== -->
        <div id="envelope">
            <div class="envelope-icon">💌</div>
            <div class="envelope-text">有一封信给你</div>

            <div id="loadingArea">
                <div class="progress-bar-bg">
                    <div class="progress-bar-fill" id="progressFill"></div>
                </div>
                <div class="loading-text" id="loadingText">📮 信件接收中</div>
            </div>

            <button id="openBtn">💕 拆开</button>
        </div>

        <!-- ===== 表白文字 + 律动条 ===== -->
        <div id="content">
            <div class="line">第一次见到你</div>
            <div class="line">世界突然变得明亮</div>
            <div class="line">仿佛你在我的世界开了一扇窗</div>
            <div class="line">从此阳光都照进来</div>
            <div class="line">我爱周玉这句话</div>
            <div class="line">开始生根发芽</div>
            <div class="line">慢慢的枝繁叶茂</div>
            <div class="line">整棵树上开满了情歌</div>
            <div class="line">微风悄悄经过</div>
            <div class="line">带到你耳边</div>
            <div class="line">是我在对你唱</div>

            <!-- 律动条容器 -->
            <div id="visualizerWrapper">
                <canvas id="visualizer" height="60"></canvas>
            </div>
        </div>

        <!-- ===== 信封背面（最终展示） ===== -->
	<div id="letterBack">
    		<span class="stamp">💌</span>
    		<div class="main-text">我爱你</div>
    		<div class="sender">寄信人 —— 徐琦</div>
	</div>

        <!-- ===== 底部 ===== -->
        <div class="footer" id="footer">—— 给小周的一封信 ——</div>
    </div>

    <!-- 背景音乐 -->
    <audio id="bgMusic" preload="auto" src="love.mp3">
        您的浏览器不支持 audio 元素。
    </audio>

    <script>
        (function() {
            // ===== DOM 引用 =====
            const audio = document.getElementById('bgMusic');
            const envelope = document.getElementById('envelope');
            const content = document.getElementById('content');
            const openBtn = document.getElementById('openBtn');
            const progressFill = document.getElementById('progressFill');
            const loadingText = document.getElementById('loadingText');
            const lines = document.querySelectorAll('.line');
            const canvas = document.getElementById('visualizer');
            const ctx = canvas.getContext('2d');
            const letterBack = document.getElementById('letterBack');
            const footer = document.getElementById('footer');
            const visualizerWrapper = document.getElementById('visualizerWrapper');

            let isOpened = false;
            let lineIndex = 0;
            let timer = null;
            let allShown = false;

            // ===== Web Audio =====
            let audioCtx = null;
            let analyser = null;
            let dataArray = null;
            let animationId = null;
            let visualizerStarted = false;

            // ===== 音乐结束 =====
            let isFadingOut = false;
            let fadeOutTimer = null;
            let musicEnded = false;

            // ===== 音频加载 =====
            let hasLoaded = false;
            let fallbackTimer = null;
            const LOAD_THRESHOLD = 0.95;

            function checkLoading() {
                if (hasLoaded) return;
                if (audio.duration > 0 && !isNaN(audio.duration)) {
                    let buffered = audio.buffered;
                    if (buffered.length > 0) {
                        let loaded = buffered.end(buffered.length - 1);
                        let percent = loaded / audio.duration;
                        progressFill.style.width = Math.min(100, percent * 100) + '%';
                        if (percent >= LOAD_THRESHOLD) {
                            loadingComplete();
                        }
                    }
                }
            }

            function loadingComplete() {
                if (hasLoaded) return;
                hasLoaded = true;
                progressFill.style.width = '100%';
                document.getElementById('loadingArea').style.display = 'none';
                openBtn.classList.add('show');
                audio.removeEventListener('progress', checkLoading);
                audio.removeEventListener('loadedmetadata', checkLoading);
                if (fallbackTimer) clearTimeout(fallbackTimer);
            }

            audio.addEventListener('progress', checkLoading);
            audio.addEventListener('loadedmetadata', checkLoading);
            if (audio.readyState >= 1) {
                setTimeout(checkLoading, 100);
            }
            fallbackTimer = setTimeout(function() {
                if (!hasLoaded) {
                    loadingComplete();
                }
            }, 15000);

            // ===== 初始化 Web Audio =====
            function initAudioContext() {
                if (!audioCtx) {
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    analyser = audioCtx.createAnalyser();
                    analyser.fftSize = 256;
                    const source = audioCtx.createMediaElementSource(audio);
                    source.connect(analyser);
                    analyser.connect(audioCtx.destination);
                    dataArray = new Uint8Array(analyser.frequencyBinCount);
                }
                if (audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }
            }

            // ===== 律动（红色热情色系） =====
            function startVisualizer() {
                if (visualizerStarted) return;
                visualizerStarted = true;
                visualizerWrapper.classList.add('active');
                resizeCanvas();
                drawVisualizer();
            }

            function resizeCanvas() {
                const rect = canvas.parentElement.getBoundingClientRect();
                const w = Math.min(rect.width, 400);
                canvas.width = w;
                canvas.height = 60;
            }

            function drawVisualizer() {
                if (!visualizerStarted || musicEnded) {
                    animationId = requestAnimationFrame(drawVisualizer);
                    return;
                }
                if (!analyser) {
                    animationId = requestAnimationFrame(drawVisualizer);
                    return;
                }
                analyser.getByteFrequencyData(dataArray);
                const width = canvas.width;
                const height = canvas.height;
                const barWidth = Math.max(2, width / dataArray.length * 2.2);
                let x = 0;

                ctx.clearRect(0, 0, width, height);

                for (let i = 0; i < dataArray.length; i++) {
                    const value = dataArray[i];
                    const percent = value / 255;
                    const barHeight = percent * (height - 12) + 3;
                    const y = (height - barHeight) / 2;

                    const hue = 0 - percent * 20;
                    const saturation = 80 + percent * 20;
                    const lightness = 50 + percent * 20;

                    ctx.fillStyle = `hsl(${hue}, ${saturation}%, ${lightness}%)`;
                    ctx.shadowColor = `hsla(${hue}, 90%, 60%, 0.4)`;
                    ctx.shadowBlur = 15;
                    ctx.fillRect(x, y, barWidth, barHeight);
                    x += barWidth + 1.5;
                }
                ctx.shadowBlur = 0;

                animationId = requestAnimationFrame(drawVisualizer);
            }

            // ===== 音量渐弱 =====
            function startFadeOut() {
                if (isFadingOut) return;
                isFadingOut = true;
                const startVol = audio.volume;
                const startTime = performance.now();
                const duration = 4000;

                function step(currentTime) {
                    const elapsed = currentTime - startTime;
                    const progress = Math.min(1, elapsed / duration);
                    const eased = 1 - Math.pow(1 - progress, 2);
                    audio.volume = startVol * (1 - eased);
                    if (progress < 1) {
                        fadeOutTimer = requestAnimationFrame(step);
                    } else {
                        audio.volume = 0;
                    }
                }
                requestAnimationFrame(step);
            }

            // ===== 合上信纸 =====
            function closeLetterAndShowBack() {
                if (musicEnded) return;
                musicEnded = true;

                if (animationId) {
                    cancelAnimationFrame(animationId);
                    animationId = null;
                }
                canvas.classList.add('fade-out');
                visualizerWrapper.classList.remove('active');

                content.classList.add('closing');
                footer.classList.add('hide');

                setTimeout(function() {
                    content.style.display = 'none';
                    canvas.style.display = 'none';
                    letterBack.classList.add('show');
                    if (audioCtx && audioCtx.state !== 'closed') {
                        audioCtx.close().catch(() => {});
                    }
                }, 900);
            }

            // ===== 监听音乐 =====
            function onTimeUpdate() {
                if (musicEnded || !isOpened) return;
                const dur = audio.duration;
                if (!dur || isNaN(dur)) return;
                const remain = dur - audio.currentTime;
                if (remain < 5 && !isFadingOut && audio.volume > 0.01) {
                    startFadeOut();
                }
            }

            function onMusicEnded() {
                if (musicEnded) return;
                audio.volume = 0;
                closeLetterAndShowBack();
            }

            audio.addEventListener('timeupdate', onTimeUpdate);
            audio.addEventListener('ended', onMusicEnded);

            // ===== 点击拆开（音乐从0开始，5秒淡入到0.2） =====
            openBtn.addEventListener('click', function() {
                if (isOpened || !hasLoaded) return;
                isOpened = true;
                openBtn.disabled = true;

                initAudioContext();

                envelope.classList.add('hidden');

                content.style.display = 'flex';
                requestAnimationFrame(() => {
                    content.classList.add('visible');
                });

                // ---- 音乐淡入修复：确保一定有声音 ----
                audio.volume = 0.01;          // 先给一个极低音量，保证可闻
                audio.play().then(() => {
                    fadeVolume(0.01, 0.2, 5000); // 从0.01开始渐入到0.2，持续5秒

                    // 后备：如果6秒后音量仍小于0.01，强制设为0.2
                    setTimeout(function() {
                        if (audio.volume < 0.01 && !musicEnded) {
                            audio.volume = 0.2;
                        }
                    }, 6000);
                }).catch(err => {
                    console.warn('音频播放被阻止，请手动点击页面后重试。');
                    // 即使被阻止，也尝试将音量调高（但播放不了）
                });

                // 延迟800ms（等待信纸完全淡入）再开始显示第一行文字
                setTimeout(function() {
                    showNextLine();
                }, 800);
            });

            // ===== 逐行显示 =====
            function showNextLine() {
                if (lineIndex >= lines.length) {
                    allShown = true;
                    startVisualizer();
                    fadeVolume(0.2, 0.7, 2500);
                    return;
                }
                lines[lineIndex].classList.add('show');
                lineIndex++;
                timer = setTimeout(showNextLine, 2000);
            }

            // ===== 通用音量渐变函数（增强版） =====
            function fadeVolume(from, to, duration) {
                // 立即设置起始值，避免卡在0
                audio.volume = from;
                if (duration <= 0) {
                    audio.volume = to;
                    return;
                }
                const startTime = performance.now();
                const diff = to - from;

                function step(currentTime) {
                    if (musicEnded) return;
                    const elapsed = currentTime - startTime;
                    const progress = Math.min(1, elapsed / duration);
                    const eased = 1 - Math.pow(1 - progress, 2);
                    audio.volume = from + diff * eased;
                    if (progress < 1) {
                        requestAnimationFrame(step);
                    }
                }
                requestAnimationFrame(step);
            }

            // ===== 辅助：用户点击页面任意位置尝试播放 =====
            document.addEventListener('click', function tryPlay() {
                if (isOpened && audio.paused && !musicEnded) {
                    audio.play().catch(() => {});
                }
                document.removeEventListener('click', tryPlay);
            }, { once: true });

            // ===== 窗口自适应 =====
            window.addEventListener('resize', function() {
                if (visualizerStarted) {
                    resizeCanvas();
                }
            });

            // ===== 清理 =====
            window.addEventListener('beforeunload', function() {
                if (timer) clearTimeout(timer);
                if (fallbackTimer) clearTimeout(fallbackTimer);
                if (fadeOutTimer) cancelAnimationFrame(fadeOutTimer);
                if (animationId) cancelAnimationFrame(animationId);
                if (audioCtx) audioCtx.close();
            });

        })();
    </script>
</body>
</html>
