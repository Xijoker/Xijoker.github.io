<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>💌 给你的信</title>
    <style>
        /* ===== 全局 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #fce8e6, #fbd9d0);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Georgia', 'Times New Roman', serif;
            padding: 20px;
            margin: 0;
        }
        .card {
            max-width: 600px;
            width: 100%;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(12px);
            border-radius: 48px;
            padding: 40px 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.12);
            text-align: center;
            position: relative;
            overflow: hidden;
            min-height: 460px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .card::before {
            content: "❤️";
            position: absolute;
            top: -20px;
            right: -10px;
            font-size: 120px;
            opacity: 0.08;
            transform: rotate(15deg);
        }

        /* ===== 信封区域 ===== */
        #envelope {
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: opacity 0.8s ease, transform 0.8s ease;
            width: 100%;
        }
        #envelope.hidden {
            opacity: 0;
            transform: scale(0.9);
            pointer-events: none;
            position: absolute;
        }
        .envelope-icon {
            font-size: 100px;
            line-height: 1;
            margin-bottom: 20px;
            animation: float 2s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .envelope-text {
            font-size: 1.4rem;
            color: #4a2c2a;
            margin-bottom: 30px;
            font-weight: 300;
            letter-spacing: 4px;
        }
        #openBtn {
            background: #ff6b6b;
            border: none;
            color: white;
            font-size: 1.5rem;
            padding: 16px 48px;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 8px 30px rgba(255, 107, 107, 0.4);
            transition: all 0.3s;
            font-weight: 600;
            letter-spacing: 2px;
        }
        #openBtn:hover {
            transform: scale(1.05);
            background: #ff5252;
            box-shadow: 0 12px 40px rgba(255, 107, 107, 0.5);
        }
        #openBtn:active {
            transform: scale(0.95);
        }
        #openBtn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* ===== 文字区域（初始隐藏） ===== */
        #content {
            display: none;
            flex-direction: column;
            gap: 20px;
            margin: 10px 0 30px;
            width: 100%;
            opacity: 0;
            transition: opacity 0.8s ease;
        }
        #content.visible {
            display: flex;
            opacity: 1;
        }
        .line {
            font-size: 1.6rem;
            line-height: 1.6;
            color: #4a2c2a;
            font-weight: 600;
            letter-spacing: 1px;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 1.2s ease, transform 1.2s ease;
        }
        .line.show {
            opacity: 1;
            transform: translateY(0);
        }

        /* ===== 底部 ===== */
        .footer {
            margin-top: 25px;
            font-size: 0.9rem;
            color: #b07a76;
            letter-spacing: 2px;
        }
        /* 当内容显示时，调整底部位置 */
        #content.visible + .footer {
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="card">
        <!-- 信封 -->
        <div id="envelope">
            <div class="envelope-icon">💌</div>
            <div class="envelope-text">有一封信给你</div>
            <button id="openBtn">💕 拆开</button>
        </div>

        <!-- 表白文字（初始隐藏） -->
        <div id="content">
            <div class="line"> 第一次见到你，</div>
            <div class="line">就觉得世界突然变得明亮。</div>
            <div class="line">仿佛你在我的世界开了一扇窗，</div>
            <div class="line">从此阳关都照进来。</div>
            <div class="line">我爱周玉这句话，</div>
            <div class="line">开始生根发芽，</div>
            <div class="line">慢慢的枝繁叶茂，</div>
            <div class="line">整棵树上开满了情歌</div>
            <div class="line">微风悄悄经过，</div>
            <div class="line">就带到了你耳边,</div>
            <div class="line">是我在对你唱:</div>
        </div>

        <div class="footer">—— 致周玉 ——</div>
    </div>

    <!-- 背景音乐 -->
    <audio id="bgMusic" loop preload="auto">
        <source src="love.mp3" type="audio/mpeg">
        您的浏览器不支持 audio 元素。
    </audio>

    <script>
        (function() {
            const envelope = document.getElementById('envelope');
            const content = document.getElementById('content');
            const openBtn = document.getElementById('openBtn');
            const audio = document.getElementById('bgMusic');
            const lines = document.querySelectorAll('.line');

            let isOpened = false;
            let lineIndex = 0;
            let timer = null;
            let allShown = false;

            // 点击拆开
            openBtn.addEventListener('click', function() {
                if (isOpened) return;
                isOpened = true;
                openBtn.disabled = true;

                // 1. 信封淡出
                envelope.classList.add('hidden');

                // 2. 显示文字区域（淡入）
                content.style.display = 'flex';
                // 强制回流后添加 visible 类以触发淡入
                requestAnimationFrame(() => {
                    content.classList.add('visible');
                });

                // 3. 开始播放音乐（小音量）
                audio.volume = 0.2;
                audio.play().catch(err => {
                    console.warn('音频播放被阻止，请手动点击页面后重试。');
                    // 如果被阻止，用户点击页面后会自动播放（见下方辅助监听）
                });

                // 4. 逐行显示文字
                showNextLine();
            });

            // 逐行显示
            function showNextLine() {
                if (lineIndex >= lines.length) {
                    // 所有文字已显示完毕
                    allShown = true;
                    // 调大音量
                    audio.volume = 0.7;
                    return;
                }
                // 显示当前行
                lines[lineIndex].classList.add('show');
                lineIndex++;
                // 间隔 0.8 秒显示下一行
                timer = setTimeout(showNextLine, 2000);
            }

            // 如果因浏览器策略导致音乐未播放，用户点击页面任意位置时尝试播放
            document.addEventListener('click', function tryPlay() {
                if (isOpened && audio.paused) {
                    audio.play().catch(() => {});
                }
                // 只尝试一次
                document.removeEventListener('click', tryPlay);
            }, { once: true });

            // 可选：如果用户手动点击了页面但音乐仍未播放，可再尝试一次（但上面的已经够了）

            // 清理定时器（预防内存泄漏，但不是必须）
            window.addEventListener('beforeunload', function() {
                if (timer) clearTimeout(timer);
            });

        })();
    </script>
</body>
</html>
