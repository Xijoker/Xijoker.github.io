<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>💌 给你的信</title>
    <style>
        /* ===== 全局 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #fce8e6, #fbd9d0);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Georgia', 'Times New Roman', serif;
            padding: 20px;
            margin: 0;
        }
        .card {
            max-width: 600px;
            width: 100%;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(12px);
            border-radius: 48px;
            padding: 40px 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.12);
            text-align: center;
            position: relative;
            overflow: hidden;
            min-height: 460px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .card::before {
            content: "❤️";
            position: absolute;
            top: -20px;
            right: -10px;
            font-size: 120px;
            opacity: 0.08;
            transform: rotate(15deg);
        }

        /* ===== 信封区域 ===== */
        #envelope {
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: opacity 0.8s ease, transform 0.8s ease;
            width: 100%;
        }
        #envelope.hidden {
            opacity: 0;
            transform: scale(0.9);
            pointer-events: none;
            position: absolute;
        }
        .envelope-icon {
            font-size: 100px;
            line-height: 1;
            margin-bottom: 20px;
            animation: float 2s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .envelope-text {
            font-size: 1.4rem;
            color: #4a2c2a;
            margin-bottom: 30px;
            font-weight: 300;
            letter-spacing: 4px;
        }

        /* ===== 进度条 ===== */
        #loadingArea {
            width: 80%;
            margin: 10px auto 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }
        .progress-bar-bg {
            width: 100%;
            height: 8px;
            background: #e0d6d4;
            border-radius: 10px;
            overflow: hidden;
        }
        .progress-bar-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #ff6b6b, #ff8e8e);
            border-radius: 10px;
            transition: width 0.3s ease;
        }
        .loading-text {
            font-size: 1rem;
            color: #7a5a56;
            letter-spacing: 2px;
            font-weight: 300;
        }

        /* ===== 拆开按钮（初始隐藏） ===== */
        #openBtn {
            background: #ff6b6b;
            border: none;
            color: white;
            font-size: 1.5rem;
            padding: 16px 48px;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 8px 30px rgba(255, 107, 107, 0.4);
            transition: all 0.3s;
            font-weight: 600;
            letter-spacing: 2px;
            display: none;
        }
        #openBtn.show {
            display: inline-block;
        }
        #openBtn:hover {
            transform: scale(1.05);
            background: #ff5252;
            box-shadow: 0 12px 40px rgba(255, 107, 107, 0.5);
        }
        #openBtn:active {
            transform: scale(0.95);
        }
        #openBtn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* ===== 文字区域（初始隐藏） ===== */
        #content {
            display: none;
            flex-direction: column;
            gap: 20px;
            margin: 10px 0 30px;
            width: 100%;
            opacity: 0;
            transition: opacity 0.8s ease;
        }
        #content.visible {
            display: flex;
            opacity: 1;
        }
        .line {
            font-size: 1.6rem;
            line-height: 1.6;
            color: #4a2c2a;
            font-weight: 600;
            letter-spacing: 1px;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.6s ease, transform 0.6s ease;
        }
        .line.show {
            opacity: 1;
            transform: translateY(0);
        }

        /* ===== 底部 ===== */
        .footer {
            margin-top: 25px;
            font-size: 0.9rem;
            color: #b07a76;
            letter-spacing: 2px;
        }
        #content.visible + .footer {
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="card">
        <!-- 信封 -->
        <div id="envelope">
            <div class="envelope-icon">💌</div>
            <div class="envelope-text">有一封信给你</div>

            <!-- 进度条区域 -->
            <div id="loadingArea">
                <div class="progress-bar-bg">
                    <div class="progress-bar-fill" id="progressFill"></div>
                </div>
                <div class="loading-text" id="loadingText">📮 信件接收中</div>
            </div>

            <!-- 拆开按钮（初始隐藏） -->
            <button id="openBtn">💕 拆开</button>
        </div>

        <!-- 表白文字（初始隐藏） -->
        <div id="content">
            <div class="line">第一次见到你，</div>
            <div class="line">就觉得世界突然变得明亮。</div>
            <div class="line">仿佛你在我的世界开了一扇窗，</div>
            <div class="line">从此阳光都照进来。</div>
            <div class="line">我爱周玉这句话，</div>
            <div class="line">开始生根发芽，</div>
            <div class="line">慢慢的枝繁叶茂，</div>
            <div class="line">整棵树上开满了情歌。</div>
            <div class="line">微风悄悄经过，</div>
            <div class="line">就带到了你耳边，</div>
            <div class="line">是我在对你唱：</div>
        </div>

        <div class="footer">—— 给小周的一封信 ——</div>
    </div>

    <!-- 背景音乐 -->
    <audio id="bgMusic" loop preload="auto" src="love.mp3">
        您的浏览器不支持 audio 元素。
    </audio>

    <script>
        (function() {
            const audio = document.getElementById('bgMusic');
            const envelope = document.getElementById('envelope');
            const content = document.getElementById('content');
            const openBtn = document.getElementById('openBtn');
            const progressFill = document.getElementById('progressFill');
            const loadingText = document.getElementById('loadingText');
            const lines = document.querySelectorAll('.line');

            let isOpened = false;
            let lineIndex = 0;
            let timer = null;
            let allShown = false;

            // ===== 监听音频加载进度 =====
            let hasLoaded = false;
            let fallbackTimer = null;

            // 更新进度条
            function updateProgress() {
                if (audio.duration > 0) {
                    let buffered = audio.buffered;
                    if (buffered.length > 0) {
                        let loaded = buffered.end(buffered.length - 1);
                        let percent = Math.min(100, (loaded / audio.duration) * 100);
                        progressFill.style.width = percent + '%';
                    }
                }
            }

            audio.addEventListener('progress', updateProgress);

            // 当加载足够流畅播放时触发
            audio.addEventListener('canplaythrough', function onCanPlay() {
                if (hasLoaded) return;
                hasLoaded = true;
                progressFill.style.width = '100%';
                document.getElementById('loadingArea').style.display = 'none';
                openBtn.classList.add('show');
                audio.removeEventListener('progress', updateProgress);
                audio.removeEventListener('canplaythrough', onCanPlay);
                if (fallbackTimer) clearTimeout(fallbackTimer);
            });

            // 超时保护（15秒后强制显示按钮）
            fallbackTimer = setTimeout(function() {
                if (!hasLoaded) {
                    document.getElementById('loadingArea').style.display = 'none';
                    openBtn.classList.add('show');
                    hasLoaded = true;
                    audio.removeEventListener('progress', updateProgress);
                }
            }, 15000);

            // 如果音频已经加载完成（缓存）
            if (audio.readyState >= 4) {
                clearTimeout(fallbackTimer);
                document.getElementById('loadingArea').style.display = 'none';
                openBtn.classList.add('show');
                hasLoaded = true;
                audio.removeEventListener('progress', updateProgress);
            }

            // ===== 点击拆开 =====
            openBtn.addEventListener('click', function() {
                if (isOpened || !hasLoaded) return;
                isOpened = true;
                openBtn.disabled = true;

                // 1. 信封淡出
                envelope.classList.add('hidden');

                // 2. 显示文字区域（淡入）
                content.style.display = 'flex';
                requestAnimationFrame(() => {
                    content.classList.add('visible');
                });

                // 3. 开始播放音乐（小音量）
                audio.volume = 0.2;
                audio.play().catch(err => {
                    console.warn('音频播放被阻止，请手动点击页面后重试。');
                });

                // 4. 逐行显示文字
                showNextLine();
            });

            // 逐行显示
            function showNextLine() {
                if (lineIndex >= lines.length) {
                    allShown = true;
                    // 文字全部显示，音乐音量平滑提升
                    fadeVolume(0.2, 0.7, 2500); // 2.5秒内从0.2升到0.7
                    return;
                }
                lines[lineIndex].classList.add('show');
                lineIndex++;
                timer = setTimeout(showNextLine, 1200);
            }

            // ===== 音量平滑过渡 =====
            function fadeVolume(from, to, duration) {
                const startTime = performance.now();
                const startVol = from;
                const diff = to - from;

                function step(currentTime) {
                    const elapsed = currentTime - startTime;
                    const progress = Math.min(1, elapsed / duration);
                    // 缓动函数：ease-out 使开始快结束慢，更自然
                    const eased = 1 - Math.pow(1 - progress, 2);
                    audio.volume = startVol + diff * eased;
                    if (progress < 1) {
                        requestAnimationFrame(step);
                    }
                }
                requestAnimationFrame(step);
            }

            // 如果因浏览器策略导致音乐未播放，用户点击页面任意位置时尝试播放
            document.addEventListener('click', function tryPlay() {
                if (isOpened && audio.paused) {
                    audio.play().catch(() => {});
                }
                document.removeEventListener('click', tryPlay);
            }, { once: true });

            // 清理定时器
            window.addEventListener('beforeunload', function() {
                if (timer) clearTimeout(timer);
                if (fallbackTimer) clearTimeout(fallbackTimer);
            });

        })();
    </script>
</body>
</html>
